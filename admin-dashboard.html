<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Bellas Boutique</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
body{
    background:#f3f4f6;
    margin:0;
}

/* NAVBAR */
.navbar{
    background: linear-gradient(135deg,#f72585,#8e2de2);
    color:white;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    min-height:100vh;
    background:white;
    box-shadow:0 0 15px rgba(0,0,0,0.05);
}

.menu-item{
    width:100%;
    border:none;
    background:none;
    padding:12px;
    text-align:left;
    border-radius:10px;
    margin-bottom:10px;
    transition:0.2s;
}

.menu-item:hover{
    background:#f3f4f6;
}

.menu-item.active{
    background: linear-gradient(135deg,#f72585,#8e2de2);
    color:white;
}

/* CONTENIDO */
.content{
    flex:1;
}

/* CARDS */
.card-admin{
    border:none;
    border-radius:15px;
    padding:20px;
    background:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
    text-align:center;
    font-weight:bold;
}

/* TABLAS */
table{
    width:100%;
}

.badge{
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
}

.green{background:#dcfce7;color:#15803d;}
.blue{background:#dbeafe;color:#1d4ed8;}
.yellow{background:#fef9c3;color:#a16207;}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar px-4 py-3">
    <span class="fw-bold">Panel Administrador</span>

    <button class="btn btn-light btn-sm" onclick="cerrarSesion()">
        <i class="bi bi-box-arrow-right"></i> Salir
    </button>
</nav>

<div class="d-flex">

<!-- SIDEBAR -->
<div class="sidebar p-3">

    <h5 class="mb-4">Módulos</h5>

    <button class="menu-item active" onclick="cargarVista(event,'dashboard')">
        <i class="bi bi-speedometer2"></i> Dashboard
    </button>

    <button class="menu-item" onclick="window.location.href='admin-productos.html'">
    <i class="bi bi-bag"></i> Productos
</button>


 <button class="menu-item" onclick="window.location.href='admin-ventas.html'">
    <i class="bi bi-cash-coin me-2"></i> Ventas
</button>

    <button class="menu-item" onclick="window.location.href='admin-reportes.html'">
    <i class="bi bi-bar-chart-line"></i> Reportes
</button>

 <button class="menu-item" onclick="window.location.href='admin-usuarios.html'">
    <i class="bi bi-people me-2"></i>Usuarios
</button>

</div>

<!-- CONTENIDO -->
<div class="content p-4" id="contenido"></div>

</div>

<script>
// VALIDAR SESIÓN
const usuario = JSON.parse(localStorage.getItem("sesionActiva"));

if (!usuario || usuario.rol !== "Administrador") {
    window.location.href = "login.html";
}

// CERRAR SESIÓN
function cerrarSesion(){
    localStorage.removeItem("sesionActiva");
    window.location.href = "login.html";
}

// CAMBIAR VISTAS
function cargarVista(e,vista){

    document.querySelectorAll(".menu-item").forEach(btn=>{
        btn.classList.remove("active");
    });

    e.target.classList.add("active");

    const contenido = document.getElementById("contenido");

    if(vista === "dashboard"){
        contenido.innerHTML = `
            <h2 class="mb-4">Dashboard</h2>

            <div class="row g-4">
                <div class="col-md-3">
                    <div class="card-admin">Ventas ₡2,450,000</div>
                </div>
                <div class="col-md-3">
                    <div class="card-admin">Pedidos 156</div>
                </div>
                <div class="col-md-3">
                    <div class="card-admin">Clientes 48</div>
                </div>
                <div class="col-md-3">
                    <div class="card-admin">Productos 342</div>
                </div>
            </div>
        `;
    }

    if(vista === "productos"){
        contenido.innerHTML = `
            <h2 class="mb-4">Gestión de Productos</h2>
            <button class="btn btn-primary mb-3">Agregar Producto</button>

            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Stock</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Vestido Rosa</td>
                        <td>₡45,000</td>
                        <td>10</td>
                    </tr>
                </tbody>
            </table>
        `;
    }

    if(vista === "reportes"){
        contenido.innerHTML = `
            <h2>Reportes</h2>
            <p>Aquí irán los reportes.</p>
        `;
    }

    if(vista === "usuarios"){
        contenido.innerHTML = `
            <h2 class="mb-4">Usuarios</h2>

            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Rol</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Admin</td>
                        <td>admin@bellas.com</td>
                        <td><span class="badge blue">Administrador</span></td>
                    </tr>
                </tbody>
            </table>
        `;
    }

    if(vista === "soporte"){
        contenido.innerHTML = `
            <h2>Soporte</h2>
            <p>Centro de ayuda y tickets.</p>
        `;
    }
}

// CARGA INICIAL
cargarVista(null,'dashboard');
</script>

</body>
</html>
