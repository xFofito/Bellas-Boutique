<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ventas</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f5f6fa;
}

/* Botones */
.btn-gradient{
    background: linear-gradient(135deg,#ec4899,#8b5cf6);
    color:white;
    border:none;
}
.btn-gradient:hover{
    opacity:0.9;
}

/* Cards */
.card-custom{
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    border:none;
}

.navbar {
    background: linear-gradient(135deg,#f72585,#8e2de2);
    color:white;
}

/* Badges */
.badge-green{background:#d1fae5;color:#065f46;}
.badge-yellow{background:#fef3c7;color:#92400e;}
.badge-red{background:#fee2e2;color:#991b1b;}
.badge-blue{background:#dbeafe;color:#1e40af;}
</style>
</head>

<body>

    <!-- NAVBAR -->
<nav class="navbar px-4 py-3 d-flex justify-content-between">
    <h5 class="mb-0">Ventas y Facturación</h5>
    <a href="admin-dashboard.html" class="btn btn-light btn-sm">
        <i class="bi bi-arrow-left"></i> Volver
    </a>
</nav>

<div class="container py-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold">Ventas y Facturación</h3>
            <p class="text-muted">Administra todas las transacciones</p>
        </div>
        <button class="btn btn-gradient px-4">
            <i class="bi bi-download me-2"></i> Exportar
        </button>
    </div>

    <!-- STATS -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card card-custom p-3">
                <small>Ingresos Totales</small>
                <h4 class="text-success fw-bold" id="totalRevenue"></h4>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-custom p-3">
                <small>Pendientes</small>
                <h4 class="text-warning fw-bold" id="pendingRevenue"></h4>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-custom p-3">
                <small>Total Pedidos</small>
                <h4 id="totalOrders"></h4>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card card-custom p-3">
                <small>Tasa de Éxito</small>
                <h4 class="text-primary" id="successRate"></h4>
            </div>
        </div>
    </div>

    <!-- FILTROS -->
    <div class="card card-custom p-3 mb-4">
        <div class="row g-3">
            <div class="col-md-4">
                <input type="text" id="search" class="form-control" placeholder="Buscar por orden o cliente">
            </div>
            <div class="col-md-4">
                <select id="statusFilter" class="form-select">
                    <option value="all">Todos</option>
                    <option value="Pagado">Pagado</option>
                    <option value="Pendiente">Pendiente</option>
                    <option value="Cancelado">Cancelado</option>
                </select>
            </div>
        </div>
    </div>

    <!-- TABLA -->
    <div class="card card-custom">
        <div class="table-responsive">
            <table class="table">
                <thead class="table-light">
                    <tr>
                        <th>Orden</th>
                        <th>Cliente</th>
                        <th>Fecha</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Método</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- GRAFICO -->
    <div class="card card-custom mt-4 p-4">
        <h5 class="fw-bold mb-3">Ventas por Día</h5>
        <canvas id="salesChart"></canvas>
    </div>

</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let sales = [
    {id:"12345",customer:"María López",date:"26/03",total:185000,status:"Pagado"},
    {id:"12344",customer:"Ana García",date:"26/03",total:85500,status:"Pagado"},
    {id:"12343",customer:"Sofia Rojas",date:"25/03",total:128500,status:"Pendiente"},
    {id:"12342",customer:"Laura Pérez",date:"25/03",total:189000,status:"Pagado"},
    {id:"12341",customer:"Carmen Vega",date:"24/03",total:48500,status:"Cancelado"},
];

function renderTable(){
    const search = document.getElementById("search").value.toLowerCase();
    const status = document.getElementById("statusFilter").value;

    const filtered = sales.filter(s =>
        (s.customer.toLowerCase().includes(search) || s.id.includes(search)) &&
        (status === "all" || s.status === status)
    );

    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    filtered.forEach(s=>{
        let badgeClass = s.status === "Pagado" ? "badge-green" :
                         s.status === "Pendiente" ? "badge-yellow" : "badge-red";

        tbody.innerHTML += `
        <tr>
            <td>#${s.id}</td>
            <td>${s.customer}</td>
            <td>${s.date}</td>
            <td>${Math.floor(Math.random()*5)+1}</td>
            <td class="fw-bold text-primary">₡${s.total.toLocaleString()}</td>
            <td><span class="badge badge-blue">Tarjeta</span></td>
            <td><span class="badge ${badgeClass}">${s.status}</span></td>
        </tr>`;
    });
}

function updateStats(){
    let totalRevenue = sales.filter(s=>s.status==="Pagado")
        .reduce((sum,s)=>sum+s.total,0);

    let pendingRevenue = sales.filter(s=>s.status==="Pendiente")
        .reduce((sum,s)=>sum+s.total,0);

    let totalOrders = sales.length;
    let paidOrders = sales.filter(s=>s.status==="Pagado").length;

    document.getElementById("totalRevenue").innerText = "₡"+totalRevenue.toLocaleString();
    document.getElementById("pendingRevenue").innerText = "₡"+pendingRevenue.toLocaleString();
    document.getElementById("totalOrders").innerText = totalOrders;
    document.getElementById("successRate").innerText =
        Math.round((paidOrders/totalOrders)*100)+"%";
}

function createChart(){
    const ctx = document.getElementById("salesChart");

    new Chart(ctx, {
        type: "line",
        data: {
            labels: ["24 Mar","25 Mar","26 Mar"],
            datasets: [{
                label: "Ventas",
                data: [48500,317500,270500],
                borderWidth: 3,
                fill: false
            }]
        }
    });
}

document.getElementById("search").addEventListener("input",renderTable);
document.getElementById("statusFilter").addEventListener("change",renderTable);

renderTable();
updateStats();
createChart();
</script>

</body>
</html>
