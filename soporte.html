<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Soporte</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f5f6fa;
}

/* Botón gradiente */
.btn-gradient{
    background: linear-gradient(135deg,#ec4899,#8b5cf6);
    color:white;
    border:none;
}
.btn-gradient:hover{opacity:0.9}

/* Cards */
.card-custom{
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    border:none;
}

/* Tabs */
.tab-btn{
    cursor:pointer;
    padding:12px;
    text-align:center;
    font-weight:600;
}
.tab-active{
    background:#fde2f3;
    color:#ec4899;
    border-bottom:3px solid #ec4899;
}

/* Chat */
.chat-box{
    height:400px;
    overflow-y:auto;
    background:#f9fafb;
    border-radius:10px;
    padding:10px;
}
.msg-user{
    background: linear-gradient(135deg,#ec4899,#8b5cf6);
    color:white;
    padding:8px 12px;
    border-radius:10px;
    margin:5px 0;
    text-align:right;
}
.msg-bot{
    background:white;
    padding:8px 12px;
    border-radius:10px;
    margin:5px 0;
}

.navbar {
    background: linear-gradient(135deg,#f72585,#8e2de2);
    color:white;
}

</style>
</head>

<body>

     <!-- NAVBAR -->
<nav class="navbar px-4 py-3 d-flex justify-content-between">
    <h5 class="mb-0">Centro de Soporte</h5>
    <a href="index.html" class="btn btn-gradient">
            <i class="bi bi-arrow-left"></i> Volver
        </a>
</nav>

<div class="container py-4">

    <!-- HEADER -->
    <div class="text-center mb-4">
        <h2 class="fw-bold">Centro de Soporte</h2>
        <p class="text-muted">Estamos aquí para ayudarte</p>
    </div>

    <!-- CONTACTO -->
    <div class="row mb-4 text-center">
        <div class="col-md-4">
            <div class="card card-custom p-3">
                <i class="bi bi-envelope fs-3 text-danger"></i>
                <h6>Email</h6>
                <small>info@bellas.com</small>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-custom p-3">
                <i class="bi bi-telephone fs-3 text-primary"></i>
                <h6>Teléfono</h6>
                <small>+506 2222-3333</small>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-custom p-3">
                <i class="bi bi-whatsapp fs-3 text-success"></i>
                <h6>WhatsApp</h6>
                <small>+506 8888-9999</small>
            </div>
        </div>
    </div>

    <!-- TABS -->
    <div class="card card-custom">
        <div class="row text-center border-bottom">
            <div class="col tab-btn tab-active" onclick="showTab('faq')">FAQ</div>
            <div class="col tab-btn" onclick="showTab('chat')">Chat</div>
            <div class="col tab-btn" onclick="showTab('sugerencia')">Sugerencias</div>
            <div class="col tab-btn" onclick="showTab('encuesta')">Encuesta</div>
        </div>

        <div class="p-4">

            <!-- FAQ -->
            <div id="faq">
                <div class="accordion" id="faqAccordion">
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#f1">
                                ¿Tiempo de entrega?
                            </button>
                        </h2>
                        <div id="f1" class="accordion-collapse collapse show">
                            <div class="accordion-body">
                                3-5 días hábiles en GAM, 5-7 fuera.
                            </div>
                        </div>
                    </div>

                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#f2">
                                ¿Devoluciones?
                            </button>
                        </h2>
                        <div id="f2" class="accordion-collapse collapse">
                            <div class="accordion-body">
                                Hasta 30 días con producto sin uso.
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CHAT -->
            <div id="chat" style="display:none;">
                <div class="chat-box" id="chatBox">
                    <div class="msg-bot">Hola 👋 ¿En qué puedo ayudarte?</div>
                </div>

                <div class="d-flex mt-3">
                    <input type="text" id="chatInput" class="form-control" placeholder="Escribe...">
                    <button class="btn btn-gradient ms-2" onclick="sendMsg()">Enviar</button>
                </div>
            </div>

            <!-- SUGERENCIAS -->
            <div id="sugerencia" style="display:none;">
                <form onsubmit="sendSuggestion(event)">
                    <input class="form-control mb-2" placeholder="Nombre" required>
                    <input class="form-control mb-2" placeholder="Email" required>
                    <textarea class="form-control mb-2" placeholder="Mensaje" required></textarea>
                    <button class="btn btn-gradient w-100">Enviar</button>
                </form>
            </div>

            <!-- ENCUESTA -->
            <div id="encuesta" style="display:none;">
                <form onsubmit="sendSurvey(event)">
                    <label>Calificación</label>
                    <select class="form-select mb-3">
                        <option>Excelente</option>
                        <option>Bueno</option>
                        <option>Regular</option>
                        <option>Malo</option>
                    </select>
                    <textarea class="form-control mb-2" placeholder="Comentarios"></textarea>
                    <button class="btn btn-gradient w-100">Enviar</button>
                </form>
            </div>

        </div>
    </div>

</div>

<script>
function showTab(tab){
    document.querySelectorAll("#faq,#chat,#sugerencia,#encuesta")
        .forEach(el=>el.style.display="none");

    document.getElementById(tab).style.display="block";

    document.querySelectorAll(".tab-btn").forEach(btn=>btn.classList.remove("tab-active"));
    event.target.classList.add("tab-active");
}

function sendMsg(){
    let input = document.getElementById("chatInput");
    if(input.value.trim()=="") return;

    let chat = document.getElementById("chatBox");

    chat.innerHTML += `<div class="msg-user">${input.value}</div>`;

    setTimeout(()=>{
        chat.innerHTML += `<div class="msg-bot">Te responderemos pronto 👍</div>`;
        chat.scrollTop = chat.scrollHeight;
    },1000);

    input.value="";
}

function sendSuggestion(e){
    e.preventDefault();
    alert("Sugerencia enviada");
}

function sendSurvey(e){
    e.preventDefault();
    alert("Encuesta enviada");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
