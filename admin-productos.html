<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Productos | Bellas Boutique</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
body{
    background:#f3f4f6;
}

/* NAVBAR */
.navbar{
    background: linear-gradient(135deg,#f72585,#8e2de2);
    color:white;
}

/* CARD */
.card-custom{
    background:white;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
    padding:20px;
}

/* BOTON */
.btn-gradient{
    background: linear-gradient(135deg,#f72585,#8e2de2);
    color:white;
    border:none;
}

/* BADGES */
.badge-activo{
    background:#dcfce7;
    color:#15803d;
    padding:5px 10px;
    border-radius:20px;
}

.badge-inactivo{
    background:#fee2e2;
    color:#dc2626;
    padding:5px 10px;
    border-radius:20px;
}

/* MODAL */
.modal-custom{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:flex;
    justify-content:center;
    align-items:center;
}

.modal-box{
    background:white;
    padding:25px;
    border-radius:15px;
    width:400px;
}

/* HOVER */
table tbody tr:hover{
    background:#f9fafb;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar px-4 py-3 d-flex justify-content-between">
    <h5 class="mb-0">Gestión de Productos</h5>
    <a href="admin-dashboard.html" class="btn btn-light btn-sm">
        <i class="bi bi-arrow-left"></i> Volver
    </a>
</nav>

<div class="container py-4">

<div class="card-custom">

<!-- HEADER -->
<div class="d-flex justify-content-between mb-3">
    <input id="search" class="form-control w-50" placeholder="Buscar productos...">
    
    <button class="btn btn-gradient" onclick="abrirModal('add')">
        <i class="bi bi-plus"></i> Nuevo Producto
    </button>
</div>

<div class="mb-3">
    <select id="filtro" class="form-select w-25">
        <option value="all">Todas las categorías</option>
        <option value="Ropa">Ropa</option>
        <option value="Calzado">Calzado</option>
        <option value="Accesorios">Accesorios</option>
    </select>
</div>

<!-- TABLA -->
<div class="table-responsive">
<table class="table">
<thead>
<tr>
<th>ID</th>
<th>Producto</th>
<th>Categoría</th>
<th>Precio</th>
<th>Stock</th>
<th>Ventas</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tablaProductos"></tbody>
</table>
</div>

</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal-custom d-none">
<div class="modal-box">

<h4 id="modalTitle"></h4>

<input id="nombre" class="form-control mb-2" placeholder="Nombre">

<select id="categoria" class="form-control mb-2">
<option>Ropa</option>
<option>Calzado</option>
<option>Accesorios</option>
</select>

<input id="precio" type="number" class="form-control mb-2" placeholder="Precio">

<input id="stock" type="number" class="form-control mb-2" placeholder="Stock">

<select id="estado" class="form-control mb-3">
<option>Activo</option>
<option>Inactivo</option>
</select>

<div class="d-flex gap-2">
<button class="btn btn-secondary w-50" onclick="cerrarModal()">Cancelar</button>
<button class="btn btn-gradient w-50" onclick="guardarProducto()">Guardar</button>
</div>

</div>
</div>

<script>
// BASE DE DATOS
let productos = JSON.parse(localStorage.getItem("productos")) || [
{ id:1, name:"Vestido Elegante Rosa", category:"Ropa", price:45000, stock:15, status:"Activo", sales:45 },
{ id:2, name:"Bolso de Cuero Premium", category:"Accesorios", price:85000, stock:8, status:"Activo", sales:32 },
{ id:3, name:"Tacones Elegantes", category:"Calzado", price:55000, stock:12, status:"Activo", sales:38 }
];

let editando = null;

// INIT
renderTabla();

document.getElementById("search").addEventListener("input", renderTabla);
document.getElementById("filtro").addEventListener("change", renderTabla);

// RENDER
function renderTabla(){

let search = document.getElementById("search").value.toLowerCase();
let filtro = document.getElementById("filtro").value;

let data = productos.filter(p=>{
return p.name.toLowerCase().includes(search) &&
(filtro==="all" || p.category===filtro);
});

document.getElementById("tablaProductos").innerHTML = data.map(p=>`
<tr>
<td>#${p.id}</td>
<td>${p.name}</td>
<td><span class="badge bg-secondary">${p.category}</span></td>
<td>₡${p.price.toLocaleString()}</td>
<td style="color:${p.stock===0?'red':p.stock<10?'orange':'green'}">${p.stock}</td>
<td>${p.sales}</td>
<td>
<span class="${p.status==='Activo'?'badge-activo':'badge-inactivo'}">
${p.status}
</span>
</td>
<td>
<button class="btn btn-sm btn-primary" onclick="editar(${p.id})">
<i class="bi bi-pencil"></i>
</button>

<button class="btn btn-sm btn-danger" onclick="eliminar(${p.id})">
<i class="bi bi-trash"></i>
</button>
</td>
</tr>
`).join("");
}

// MODAL
function abrirModal(modo,id=null){

document.getElementById("modal").classList.remove("d-none");

if(modo==="add"){
editando=null;
document.getElementById("modalTitle").innerText="Nuevo Producto";
limpiarForm();
}else{
editando=id;
let p = productos.find(x=>x.id===id);

document.getElementById("modalTitle").innerText="Editar Producto";
document.getElementById("nombre").value=p.name;
document.getElementById("categoria").value=p.category;
document.getElementById("precio").value=p.price;
document.getElementById("stock").value=p.stock;
document.getElementById("estado").value=p.status;
}
}

function cerrarModal(){
document.getElementById("modal").classList.add("d-none");
}

// GUARDAR
function guardarProducto(){

let p = {
id: editando ?? (productos.length?Math.max(...productos.map(x=>x.id))+1:1),
name: document.getElementById("nombre").value,
category: document.getElementById("categoria").value,
price: Number(document.getElementById("precio").value),
stock: Number(document.getElementById("stock").value),
status: document.getElementById("estado").value,
sales: 0
};

if(editando){
productos = productos.map(x=>x.id===editando ? {...x,...p} : x);
}else{
productos.push(p);
}

localStorage.setItem("productos", JSON.stringify(productos));

cerrarModal();
renderTabla();
}

// EDITAR
function editar(id){
abrirModal("edit",id);
}

// ELIMINAR
function eliminar(id){
if(confirm("¿Eliminar producto?")){
productos = productos.filter(p=>p.id!==id);
localStorage.setItem("productos", JSON.stringify(productos));
renderTabla();
}
}

// LIMPIAR
function limpiarForm(){
document.getElementById("nombre").value="";
document.getElementById("precio").value="";
document.getElementById("stock").value="";
}
</script>

</body>
</html>
